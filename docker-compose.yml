services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gto_docs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    image: gto_docs_backend:migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  gto_docs_backend:
    build:
      context: .
      target: runtime
    image: gto_docs_backend:latest
    env_file:
      - .env
    environment:
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
#    depends_on:
#      migrate:
#        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
